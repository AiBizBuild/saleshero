          <button className="btn" onClick={onWork} style={{background:`${T.mint}15`,border:`2px solid ${T.mint}`,color:T.white,padding:"13px 15px",borderRadius:10,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{fontWeight:700,fontSize:13,color:T.mint}}>⚡ Jump straight to work</div>
            <div style={{fontSize:10,color:T.steel,marginTop:2}}>More time. Energy: {game.energy}/100.{tier.uber?.active?" Uber hits at noon — plan around it.":""} Can recharge mid-day if needed.</div>
          </button>
          <button className="btn" onClick={onPipeline} style={{background:`${T.blue}15`,border:`2px solid ${T.blue}`,color:T.white,padding:"13px 15px",borderRadius:10,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{fontWeight:700,fontSize:13,color:T.blue}}>📋 Review pipeline first</div>
            <div style={{fontSize:10,color:T.steel,marginTop:2}}>Check follow-ups, plan calls. 15 min. Fewer missed opportunities. Good when pipeline is active.</div>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── POST CALL CHOICE ──────────────────────────────────────────
function PostCallChoice({result,comm,prospect,game,onNext}){
  const won=comm>0;
  const callsLeft=3-(game.actions?.calls||0);
  const energyLow=game.energy<35;
  const timeLeft=game.timeRemaining;
  return(
    <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
      <HeroStats game={game}/>
      <div style={{maxWidth:500,margin:"0 auto",paddingTop:20}}>
        <Card className="fi" style={{borderColor:won?T.gold:T.dim,textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:36,marginBottom:6}}>{won?"🏆":result==="callback"?"📅":result==="walked_away"?"🚶":"❌"}</div>
          <div style={{fontWeight:700,fontSize:15,color:won?T.gold:T.steel}}>
            {won?`${prospect?.name||"Client"} enrolled. ${fmt(comm)} earned.`:result==="callback"?"Follow-up scheduled.":result==="walked_away"?"You walked away. Integrity +20.":"No close this time."}
          </div>
          <div style={{fontSize:11,color:T.steel,marginTop:4}}>Energy: {game.energy}/100 · Time left: {fmtM(timeLeft)}</div>
        </Card>
        <div style={{fontSize:12,color:T.steel,marginBottom:10,fontWeight:600}}>What do you do next?</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {callsLeft>0&&timeLeft>=45&&!energyLow&&(
            <button className="btn" onClick={()=>onNext("call")}
              style={{background:`${T.mint}15`,border:`2px solid ${T.mint}`,color:T.white,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontWeight:700,color:T.mint}}>📞 Take another call</div>
              <div style={{fontSize:10,color:T.steel,marginTop:2}}>{callsLeft} slot{callsLeft>1?"s":""} remaining · {fmtM(timeLeft)} left today</div>
            </button>
          )}
          {callsLeft>0&&timeLeft>=45&&energyLow&&(
            <button className="btn" onClick={()=>onNext("call")}
              style={{background:`${T.amber}15`,border:`2px solid ${T.amber}`,color:T.white,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontWeight:700,color:T.amber}}>📞 Push through — take another call anyway</div>
              <div style={{fontSize:10,color:T.steel,marginTop:2}}>Low energy ({game.energy}/100). Clients will sense it. Your call.</div>
            </button>
          )}
          {timeLeft>=15&&(
            <button className="btn" onClick={()=>onNext("recharge")}
              style={{background:`${T.gold}15`,border:`2px solid ${T.gold}`,color:T.white,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontWeight:700,color:T.gold}}>✨ Recharge — do a 3 Bs reset first</div>
              <div style={{fontSize:10,color:T.steel,marginTop:2}}>{energyLow?"Strongly recommended — you're running low.":"Optional. Higher energy = better calls."}</div>
            </button>
          )}
          <button className="btn" onClick={()=>onNext("outbound")}
            style={{background:`${T.blue}15`,border:`2px solid ${T.blue}`,color:T.white,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",opacity:timeLeft<45?.5:1}}>
            <div style={{fontWeight:700,color:T.blue}}>📞 Make an outbound call</div>
            <div style={{fontSize:10,color:T.steel,marginTop:2}}>You pick the prospect. You dial. Full control.</div>
          </button>
          <button className="btn" onClick={()=>onNext("hub")}
            style={{background:"transparent",border:`1px solid ${T.dim}`,color:T.steel,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{fontWeight:600}}>📋 Back to hub — review pipeline and plan</div>
          </button>
          {timeLeft<120&&(
            <button className="btn" onClick={()=>onNext("endday")}
              style={{background:`${T.red}10`,border:`1px solid ${T.red}40`,color:T.red,padding:"13px 16px",borderRadius:8,textAlign:"left",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{fontWeight:600}}>💤 Call it a day — rest and recover</div>
              <div style={{fontSize:10,color:T.dim,marginTop:2}}>{fmtM(timeLeft)} left. Rest now = better energy tomorrow.</div>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


function MainGame({initialGame,onEnd}){
  const initSkills=Object.fromEntries(Object.entries(SKILLS_DATA).map(([k,v])=>[k,{...v,unlocked:false}]));
  const [game,setGame]=useState({...initialGame,skills:initSkills});
  const [view,setView]=useState("daystart");
  const [tab,setTab]=useState("actions");
  const [selP,setSelP]=useState(null);
  const [isOut,setIsOut]=useState(false);
  const [inboundRing,setInboundRing]=useState(null);
  const [dilemma,setDilemma]=useState(null);
  const [dOut,setDOut]=useState(null);
  const [evtMsg,setEvtMsg]=useState(null);
  const [missed,setMissed]=useState(0);
  const [postCall,setPostCall]=useState(null); // {result,comm,prospect}
  const upd=fn=>setGame(g=>fn(g));

  const unlockSkills=(skills,closed)=>{
    const s={...skills};
    if(closed>=0) s.disc={...s.disc,unlocked:true};
    if(closed>=1){s.fuji={...s.fuji,unlocked:true};s.futurep={...s.futurep,unlocked:true};}
    if(closed>=2){s.mirror={...s.mirror,unlocked:true};}
    if(closed>=3) s.silent={...s.silent,unlocked:true};
    if(closed>=4) s.spin={...s.spin,unlocked:true};
    if(closed>=5) s.walkaway={...s.walkaway,unlocked:true};
    if(closed>=7) s.challenger={...s.challenger,unlocked:true};
    return s;
  };

  const handle3Bs=(sel,totalTime,totalEnergy)=>{
    const boosts={cb:0,ob:0};let intB=0,tokB=0;
    Object.values(sel).forEach(s=>{
      if(!s) return;
      boosts.cb+=s.cbBoost||0;boosts.ob+=s.obBoost||0;
      intB+=s.intBonus||0;tokB+=s.tokBonus||0;
    });
    upd(g=>({...g,energy:Math.min(100,g.energy+totalEnergy),timeRemaining:Math.max(0,g.timeRemaining-totalTime),integrity:Math.min(100,g.integrity+intB),skillTokens:Math.min(g.skillTokens+tokB,12),dayBoosts:boosts,threeBsDone:true}));
    setView("hub");
  };

  const handleCall=(result,comm,intD=0,cbD=0,pipe=null,tokCost=0,tCost=0,drain=0)=>{
    if(result==="skill_token"){upd(g=>({...g,skillTokens:Math.max(0,g.skillTokens-tokCost)}));return;}
    upd(g=>{
      const closed=g.closedDeals+(comm>0?1:0);
      const newComm=g.commissions+comm;
      // Karma
      let karmaD=0;
      if(result==="walked_away") karmaD=KARMA_EVENTS.walked_away_unethical;
      else if(result==="closed_risky") karmaD=KARMA_EVENTS.aggressive_close_vuln;
      const newKarma=Math.max(0,Math.min(100,(g.salesKarma||50)+karmaD));
      // Badges
      const nb=[...g.badges];
      if(comm>0&&!nb.includes("first_close")) nb.push("first_close");
      if(result==="walked_away"&&!nb.includes("first_walkaway")) nb.push("first_walkaway");
      if(newComm>=2000&&!nb.includes("momentum")) nb.push("momentum");
      if(newComm>=10000&&!nb.includes("freedom_signal")) nb.push("freedom_signal");
      if((g.pipeline?.length||0)>=5&&!nb.includes("pipeline_pro")) nb.push("pipeline_pro");
      // Milestone check
      const newMiles=[...g.milestoneLog];
      MILESTONES.forEach(m=>{if(newComm>=m.amount&&!newMiles.includes(m.amount)) newMiles.push(m.amount);});
      const ls=newComm>=10000?3:newComm>=5000?2:1;
      const ng={...g,commissions:newComm,integrity:Math.max(0,Math.min(100,g.integrity+intD)),chargebacks:Math.min(10,g.chargebacks+cbD),skillTokens:comm>0?Math.min(g.skillTokens+1,12):g.skillTokens,closedDeals:closed,skills:unlockSkills(g.skills,closed),timeRemaining:Math.max(0,g.timeRemaining-tCost),energy:Math.max(0,g.energy-drain),actions:{...g.actions,calls:(g.actions.calls||0)+1},salesKarma:newKarma,badges:nb,milestoneLog:newMiles,lifestyleStage:ls};
      if(comm>0) ng.pastClients=[...g.pastClients,{id:uid(),name:selP?.name||"Client",emoji:selP?.emoji||"⭐",offer:selP?.offer||"Program",satisfaction:Math.floor(Math.random()*3)+7}];
      if(pipe) ng.pipeline=[...g.pipeline,pipe];
      return ng;
    });
    setSelP(null);setInboundRing(null);setView("hub");
    setTimeout(()=>{
      if(Math.random()<.25&&((game.actions?.calls||0)<3)&&game.timeRemaining>=45&&game.energy>15){
        setInboundRing(rand(INBOUND));
      }
    },500);
  };

  const handleTraining=(key,passed,tCost)=>{
    upd(g=>({...g,timeRemaining:Math.max(0,g.timeRemaining-tCost),energy:Math.max(0,g.energy-8),skills:passed?{...g.skills,[key]:{...g.skills[key],unlocked:true}}:g.skills}));
    setView("hub");
  };

  const handleDilemma=c=>{
    const karmaChange=c.integrity>0?KARMA_EVENTS.ethical_dilemma_right:KARMA_EVENTS.ethical_dilemma_wrong;
    const newBadges=c.integrity>0&&!game.badges.includes("ethical_stand")?[...game.badges,"ethical_stand"]:game.badges;
    upd(g=>({
      ...g,
      integrity:Math.max(0,Math.min(100,g.integrity+c.integrity)),
      commissions:g.commissions+(c.comm||0),
      usedDilemmas:[...g.usedDilemmas,dilemma.id],
      salesKarma:Math.max(0,Math.min(100,(g.salesKarma||50)+karmaChange)),
      badges:newBadges,
      karmaLog:[...g.karmaLog,{event:c.integrity>0?"ethical_stand":"ethical_fail",change:karmaChange,day:g.day}],
    }));
    setDOut(c.outcome);
    setTimeout(advanceDay,3000);
  };

  const advanceDay=()=>{
    const nd=game.day+1;
    if(nd>30||game.chargebacks>=10){onEnd(game);return;}
    upd(g=>({...g,day:nd,skillTokens:Math.min(g.skillTokens+2,12),actions:{calls:0},timeRemaining:600,energy:60,threeBsDone:false,dayBoosts:{cb:0,ob:0}}));
    setView("daystart"); // Always show the day start CHOICE
    setEvtMsg(null);setDilemma(null);setDOut(null);setMissed(0);setPostCall(null);
  };

  const endDay=()=>{
    const EVS=[
      {type:"p",icon:"🔥",txt:"Client testimonial went viral. Inbound quality spiking."},
      {type:"p",icon:"📈",txt:"Competitor exposed. Their leads are shopping for alternatives."},
      {type:"n",icon:"💸",txt:"Chargeback filed. Commission reversed.",cb:1,loss:900},
      {type:"n",icon:"🌊",txt:"Budget freeze hitting main market. Close rates lower today."},
      {type:"z",icon:"💡",txt:"HERO INTEL: Top closers ask 3x more questions than they make statements."},
    ];
    if(Math.random()<.5){
      const ev=rand(EVS);setEvtMsg(ev);
      if(ev.cb) upd(g=>({...g,chargebacks:Math.min(10,g.chargebacks+1),commissions:Math.max(0,g.commissions-(ev.loss||0))}));
    }
    if(Math.random()<.25&&game.day>3){
      const unused=DILEMMAS.filter(d=>!game.usedDilemmas.includes(d.id));
      if(unused.length>0){setDilemma(rand(unused));return;}
    }
    advanceDay();
  };

  // Post-call choice handler
  const handlePostCall=(action)=>{
    setPostCall(null);
    if(action==="recharge") setView("3bs");
    else if(action==="outbound") setView("outbound");
    else if(action==="endday") endDay();
    else if(action==="call"){setView("hub");setTab("actions");}
    else setView("hub");
  };

  // Route to sub-screens
  // Uber noon check — fires when timeRemaining drops to ~240 (noon) on Uber tiers
  const uberShouldFire=game.uberActive&&!game.uberDoneToday&&game.timeRemaining<=245&&game.timeRemaining>=230;

  const handleUberDrive=()=>{
    upd(g=>({...g,timeRemaining:Math.max(0,g.timeRemaining-300),energy:Math.max(5,Math.floor(g.energy*0.5)),uberDoneToday:true,commissions:g.commissions+(g.tierData?.uber?.dailyEarnings||40)}));
    setView("hub");
  };
  const handleUberSkip=()=>{ upd(g=>({...g,uberDoneToday:true})); setView("hub"); };

  // Day start routing
  const handleDayStart=(choice)=>{
    if(choice==="routine") setView("3bs");
    else if(choice==="pipeline"){setView("hub");setTab("pipeline");}
    else setView("hub");
  };

  // Routes — check uber first (highest priority when at noon)
  if(view==="hub"&&uberShouldFire) return (<UberPopup game={game} onDrive={handleUberDrive} onSkip={handleUberSkip}/>);
  if(view==="daystart") return (<DayStart game={game} onRoutine={()=>setView("3bs")} onWork={()=>setView("hub")} onPipeline={()=>{setView("hub");setTab("pipeline");}}/>);
  if(view==="postcall"&&postCall) return (<PostCallChoice result={postCall.result} comm={postCall.comm} prospect={postCall.prospect} game={game} onNext={handlePostCall}/>);
  if(view==="3bs") return (<ThreeBs game={game} onComplete={handle3Bs} onSkip={()=>setView("hub")} isRecharge={game.threeBsDone}/>);
  if(view==="call"&&selP) return (<SalesCall prospect={selP} game={game} onComplete={handleCall} isOutbound={isOut}/>);
  if(view==="outbound") return (<OutboundList game={game} onSelect={p=>{setSelP(p);setIsOut(true);setView("call");}} onBack={()=>setView("hub")}/>);
  if(view==="training") return (<TrainingCenter game={game} onComplete={handleTraining} onBack={()=>setView("hub")}/>);

  const pct=Math.min(100,(game.commissions/15000)*100);
  const callsLeft=3-(game.actions?.calls||0);
  const pipeline=game.pipeline||[];

  return (
    <div style={{minHeight:"100vh",background:T.bg}}>
      <HeroStats game={game}/>

      {/* Inbound ring modal */}
      {inboundRing&&!dilemma&&(
        <div style={{position:"fixed",inset:0,background:"rgba(8,8,15,.9)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{maxWidth:360,width:"100%"}} className="fi">
            <Card style={{borderColor:T.mint,textAlign:"center"}}>
              <div className="pulse" style={{fontSize:48,marginBottom:8}}>📞</div>
              <div className="ht" style={{fontSize:24,color:T.mint,marginBottom:4}}>INBOUND CALL</div>
              <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>{inboundRing.emoji} {inboundRing.name}</div>
              <div style={{fontSize:11,color:T.steel,marginBottom:4}}>{inboundRing.age} · {inboundRing.city}</div>
              <div style={{fontSize:11,color:T.dim,marginBottom:12,fontStyle:"italic"}}>{inboundRing.back}</div>
              {game.energy<30&&<div style={{background:`${T.amber}20`,border:`1px solid ${T.amber}`,borderRadius:6,padding:"6px 10px",marginBottom:12,fontSize:11,color:T.amber}}>⚠️ Low energy ({game.energy}/100) — You'll be less effective. Answer or recharge first?</div>}
              <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                <Btn onClick={()=>{setSelP(inboundRing);setIsOut(false);setView("call");}} color={T.mint}>📞 Answer</Btn>
                {game.energy<40&&<Btn onClick={()=>{setInboundRing(null);setView("3bs");}} outline color={T.amber}>⚡ Recharge First</Btn>}
                <Btn onClick={()=>{setMissed(m=>m+1);setInboundRing(null);}} outline color={T.dim}>❌ Miss It</Btn>
              </div>
              {missed>0&&<div style={{fontSize:10,color:T.dim,marginTop:8}}>Missed today: {missed}</div>}
            </Card>
          </div>
        </div>
      )}

      {/* Ethical dilemma */}
      {dilemma&&!dOut&&(
        <div style={{position:"fixed",inset:0,background:"rgba(8,8,15,.93)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{maxWidth:460,width:"100%"}} className="fi">
            <Card style={{borderColor:T.amber}}>
              <div style={{fontSize:10,color:T.amber,letterSpacing:".2em",marginBottom:6}}>⚠️ ETHICAL DILEMMA</div>
              <div className="ht" style={{fontSize:22,marginBottom:8}}>{dilemma.title}</div>
              <div style={{fontSize:12,color:T.steel,lineHeight:1.7,marginBottom:12}}>{dilemma.scenario}</div>
              {dilemma.choices.map((c,i)=>(
                <button key={i} className="btn" onClick={()=>handleDilemma(c)} style={{display:"block",width:"100%",marginBottom:7,background:"transparent",border:`2px solid ${c.color}`,color:c.color,padding:"10px 14px",borderRadius:8,textAlign:"left",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                  <div>{c.label}: {c.text}</div>
                  <div style={{fontWeight:400,fontSize:10,opacity:.7,marginTop:2}}>Integrity {c.integrity>0?`+${c.integrity}`:c.integrity}{c.comm?` | +${fmt(c.comm)}`:""}</div>
                </button>
              ))}
            </Card>
          </div>
        </div>
      )}
      {dOut&&<div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:T.card,border:`1px solid ${T.gold}`,borderRadius:10,padding:"10px 18px",maxWidth:400,fontSize:12,textAlign:"center",zIndex:200}} className="fi">{dOut}</div>}

      <div style={{maxWidth:720,margin:"0 auto",padding:12}}>
        {evtMsg&&<div className="fi" style={{background:evtMsg.type==="p"?`${T.mint}15`:evtMsg.type==="n"?`${T.red}15`:T.panel,border:`1px solid ${evtMsg.type==="p"?T.mint:evtMsg.type==="n"?T.red:T.dim}`,borderRadius:8,padding:"7px 12px",marginBottom:8,fontSize:12}}>{evtMsg.icon} {evtMsg.txt}</div>}

        {/* Tier goal bar */}
        {(()=>{
          const tier=game.tierData||LIFE_TIERS[0];
          const goalPct=Math.min(100,(game.commissions/tier.salesGoal)*100);
          return(
            <div style={{background:T.panel,borderRadius:8,padding:10,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:11,color:T.steel}}>
                  <span style={{color:tier.color,fontWeight:700}}>T{game.lifeTier}</span> {tier.goalLabel}
                  {game.uberActive&&<span style={{marginLeft:8,color:T.amber,fontSize:10}}>🚗 Uber active</span>}
                </span>
                <span style={{fontSize:11,color:T.mint,fontWeight:700}}>{fmt(game.commissions)} / {fmt(tier.salesGoal)}</span>
              </div>
              <Bar v={game.commissions} max={tier.salesGoal} color={goalPct>=100?T.gold:tier.color} h={8}/>
              {game.loan&&<div style={{fontSize:10,color:T.red,marginTop:4}}>💳 Mom loan: {fmt(game.loan.amount)} remaining · {game.loan.monthsLeft} month{game.loan.monthsLeft!==1?"s":""} to repay</div>}
            </div>
          );
        })()}

        {/* Energy + 3Bs status */}
        {game.energy<30&&<div className="pulse" style={{background:`${T.red}20`,border:`1px solid ${T.red}`,borderRadius:8,padding:"7px 12px",marginBottom:8,fontSize:12,color:T.red}}>⚡ LOW ENERGY ({game.energy}/100) — Close rate reduced. Do a 3 Bs reset.</div>}
        {!game.threeBsDone&&<div style={{background:`${T.amber}15`,border:`1px solid ${T.amber}`,borderRadius:8,padding:"7px 12px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:T.amber}}>✨ No 3 Bs today yet. Performance is capped.</span>
          <Btn onClick={()=>setView("3bs")} sm color={T.amber}>Do 3 Bs →</Btn>
        </div>}
        {game.threeBsDone&&(game.dayBoosts?.cb>0||game.dayBoosts?.ob>0)&&(
          <div style={{background:`${T.mint}15`,border:`1px solid ${T.mint}`,borderRadius:8,padding:"5px 12px",marginBottom:8,fontSize:11,color:T.mint}}>
            ✅ 3 Bs active — {game.dayBoosts?.cb>0?`Close +${(game.dayBoosts.cb*100).toFixed(0)}% `:""}{game.dayBoosts?.ob>0?`Obj +${(game.dayBoosts.ob*100).toFixed(0)}%`:""}
          </div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginBottom:10,borderBottom:`1px solid ${T.border}`,paddingBottom:6}}>
          {[["actions","⚡ Actions"],["3bs","✨ 3 Bs"],["pipeline","📋 Pipeline"],["skills","🔮 Skills"]].map(([t,l])=>(
            <button key={t} className="btn" onClick={()=>t==="3bs"?setView("3bs"):setTab(t)}
              style={{background:tab===t?T.panel:"transparent",border:`1px solid ${tab===t?T.dim:"transparent"}`,color:tab===t?T.white:T.steel,padding:"5px 11px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>
              {l}{t==="actions"&&game.energy<40?" 🔴":""}
            </button>
          ))}
        </div>

        {/* ACTIONS TAB */}
        {tab==="actions"&&(
          <div className="fi">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {/* Inbound */}
              <Card style={{borderColor:callsLeft>0?T.gold:T.dim}}>
                <div style={{fontSize:10,color:T.steel,marginBottom:2}}>📞 INBOUND CALLS</div>
                <div style={{fontSize:18,fontWeight:700,color:callsLeft>0?T.gold:T.dim}}>{callsLeft}<span style={{fontSize:10,color:T.steel}}>/3 today</span></div>
                <div style={{fontSize:10,color:T.dim,marginBottom:8,lineHeight:1.5}}>Calls ring spontaneously. A popup will appear — answer or miss it.</div>
                {missed>0&&<div style={{fontSize:10,color:T.amber}}>⚠️ {missed} missed today</div>}
              </Card>

              {/* Outbound */}
              <Card style={{borderColor:game.timeRemaining>=45?T.mint:T.dim}}>
                <div style={{fontSize:10,color:T.steel,marginBottom:2}}>📞 OUTBOUND CALL</div>
                <div style={{fontSize:18,fontWeight:700,color:T.mint}}>You Dial</div>
                <div style={{fontSize:10,color:T.dim,marginBottom:8,lineHeight:1.5}}>Pick your prospect. You initiate. Higher baseline skepticism. Every skill available.</div>
                <Btn full sm color={T.mint} disabled={game.timeRemaining<45} onClick={()=>setView("outbound")}>📞 Browse & Dial</Btn>
              </Card>

              {/* Pipeline */}
              <Card style={{borderColor:pipeline.length>0?T.blue:T.dim}}>
                <div style={{fontSize:10,color:T.steel,marginBottom:2}}>🔄 PIPELINE FOLLOW-UPS</div>
                <div style={{fontSize:18,fontWeight:700,color:T.blue}}>{pipeline.length}<span style={{fontSize:10,color:T.steel}}> prospects</span></div>
                <div style={{fontSize:10,color:T.dim,marginBottom:8}}>⏱️ 25–50 min per call</div>
                {pipeline.length>0 ? (
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {pipeline.slice(0,2).map(p=>(
                      <button key={p.id} className="btn" onClick={()=>{setSelP({...p,age:35,city:"",role:"Follow-up",back:"Pipeline prospect from a previous call.",sk:5,urg:7,disc:"S",vuln:false});setIsOut(false);setView("call");}}
                        style={{background:"transparent",border:`1px solid ${T.blue}`,color:T.blue,padding:"5px 10px",borderRadius:5,cursor:"pointer",fontSize:10,textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}>
                        {p.emoji} {p.name} — {p.offer}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div style={{fontSize:10,color:T.dim}}>No follow-ups yet. Take calls to fill it.</div>
                )}
              </Card>

              {/* Training */}
              <Card style={{borderColor:T.blue}}>
                <div style={{fontSize:10,color:T.steel,marginBottom:2}}>📚 SKILL TRAINING</div>
                <div style={{fontSize:18,fontWeight:700,color:T.blue}}>
                  {Object.values(game.skills).filter(s=>s.unlocked).length}<span style={{fontSize:10,color:T.steel}}>/{Object.keys(game.skills).length} unlocked</span>
                </div>
                <div style={{fontSize:10,color:T.dim,marginBottom:8,lineHeight:1.5}}>Lesson + 3-question test. Pass = skill active on calls.</div>
                <Btn full sm color={T.blue} onClick={()=>setView("training")}>📚 Go to Training</Btn>
              </Card>

              {/* 3 Bs Recharge */}
              <Card style={{borderColor:game.energy<55?T.amber:T.border,gridColumn:"1/-1"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{fontSize:10,color:T.steel,marginBottom:3}}>✨ RECHARGE — 3 Bs RESET (available any time)</div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:16,fontWeight:700,color:game.energy<30?T.red:game.energy<55?T.amber:T.mint}}>⚡ {game.energy}/100</div>
                      <div style={{width:120}}><Bar v={game.energy} max={100} color={game.energy<30?T.red:game.energy<55?T.amber:T.mint}/></div>
                    </div>
                    <div style={{fontSize:11,color:T.dim}}>{game.energy<30?"🔥 Burnout active — recharge before your next call.":game.energy<55?"Energy dipping — a reset sharpens your close rate.":"Use after tough calls, before big ones."}</div>
                  </div>
                  <Btn onClick={()=>setView("3bs")} color={game.energy<30?T.red:game.energy<55?T.amber:T.gold} disabled={game.timeRemaining<15}>
                    {game.energy<30?"🚨 Recharge Now":game.energy<55?"⚡ Recharge":"✨ 3 Bs Reset"}
                  </Btn>
                </div>
              </Card>
            </div>

            <div style={{textAlign:"center",paddingTop:6,borderTop:`1px solid ${T.border}`}}>
              <Btn onClick={endDay} outline color={T.steel}>💤 End Day {game.day} →</Btn>
              {game.day>=28&&<Btn onClick={()=>onEnd(game)} outline color={T.red} style={{marginLeft:10}}>🏁 Final Accounting</Btn>}
            </div>
          </div>
        )}

        {/* PIPELINE TAB */}
        {tab==="pipeline"&&(
          <div className="fi">
            {pipeline.length===0 ? (
              <Card style={{textAlign:"center",color:T.steel}}><div style={{fontSize:28,marginBottom:6}}>📋</div>Pipeline is empty. Take calls and book follow-ups to fill it.</Card>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {pipeline.map(p=>(
                  <Card key={p.id} style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:24}}>{p.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                      <div style={{fontSize:10,color:T.steel}}>{p.offer} · {p.src}</div>
                      <Tag text={p.status} color={T.amber}/>
                    </div>
                    <Btn sm onClick={()=>{setSelP({...p,age:35,city:"",role:"Follow-up",back:"Pipeline prospect from a previous call.",sk:5,urg:7,disc:"S",vuln:false});setIsOut(false);setView("call");}}>Follow Up</Btn>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SKILLS TAB */}
        {tab==="skills"&&(
          <div className="fi">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {Object.entries(game.skills).map(([k,sk])=>(
                <Card key={k} style={{borderColor:sk.unlocked?T.gold:T.border,opacity:sk.unlocked?1:.65}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontSize:20}}>{sk.icon}</div>
                    <Tag text={sk.unlocked?"✓ UNLOCKED":"🔒 LOCKED"} color={sk.unlocked?T.gold:T.dim}/>
                  </div>
                  <div style={{fontWeight:700,marginTop:5,fontSize:12,color:sk.unlocked?T.white:T.steel}}>{sk.name}</div>
                  <div style={{fontSize:10,color:T.dim,marginTop:3,lineHeight:1.4}}>{sk.desc}</div>
                  {sk.tokens>0&&<div style={{fontSize:9,color:T.gold,marginTop:3}}>Cost: {sk.tokens} token{sk.tokens>1?"s":""}</div>}
                  {!sk.unlocked&&<Btn onClick={()=>setView("training")} sm outline color={T.blue} style={{marginTop:8}}>Train to Unlock</Btn>}
                </Card>
              ))}
            </div>
            <div style={{marginTop:8,fontSize:10,color:T.dim,textAlign:"center"}}>{game.skillTokens} tokens available. Skills unlock through the Training Center.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ENDING ────────────────────────────────────────────────────
function Ending({game,onRestart,onNewGamePlus}){
  const {commissions:c,integrity:i,closedDeals:cl=0,salesKarma:sk=50,chargebacks:cb=0,badges=[],milestoneLog=[],lifestyleStage:ls=1}=game;
  const [tab,setTab]=useState("summary");
  const [email,setEmail]=useState("");
  const [submitted,setSubmitted]=useState(false);

  const profileKey=getPlayerProfile(c,i,sk,cb,cl);
  const profile=PLAYER_PROFILES[profileKey];
  const lifestyle=LIFESTYLE_STAGES.find(x=>x.stage===Math.min(ls,5))||LIFESTYLE_STAGES[0];

  // Determine outcome title
  const outcomeTitle=c>=15000&&i>=75&&sk>=70?"Ethical Sales Hero":c>=15000&&sk>=55?"Trusted Closer":c>=15000?"Pressure Closer":i>=70&&sk>=65?"Rising Hero":cl>=5?"Developing Closer":"Explorer";

  // Grade energy management (approximate from lifestyle)
  const energyGrade=game.energy>40?"A":game.energy>25?"B":game.energy>15?"C":"D";

  // Formspree endpoint — swap YOUR_FORM_ID after creating a free form at formspree.io
  const FORMSPREE_ID = "YOUR_FORM_ID";

  const handleSubmit = async () => {
    if(!email) return;
    const leadData = {
      email,
      profile: profileKey,
      profileTitle: profile.title,
      tag: profile.tag,
      commissions: c,
      integrity: i,
      salesKarma: sk,
      closedDeals: cl,
      chargebacks: cb,
      outcomeTitle,
      badgesEarned: badges.join(", "),
      milestonesHit: milestoneLog.join(", "),
      storyPath: game.path || "marcus",
      runNumber: game.runNumber || 1,
      timestamp: new Date().toISOString(),
    };

    // Always save locally first — no data loss if network fails
    try {
      const existing = JSON.parse(localStorage.getItem("saleshero_leads") || "[]");
      existing.push(leadData);
      localStorage.setItem("saleshero_leads", JSON.stringify(existing));
    } catch(e) {}

    // Send to Formspree if ID is set
    if(FORMSPREE_ID !== "YOUR_FORM_ID") {
      try {
        await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(leadData),
        });
      } catch(e) {
        // Silent fail — data is safe in localStorage
      }
    }

    setSubmitted(true);
  };

  return (
    <div style={{minHeight:"100vh",background:T.bg,padding:16}}>
      <div style={{maxWidth:680,margin:"0 auto"}}>

        {/* Header */}
        <div className="fi" style={{textAlign:"center",marginBottom:18,paddingTop:8}}>
          <div style={{fontSize:48,marginBottom:6}}>{profile.icon}</div>
          <div className="ht" style={{fontSize:36,color:profile.color,marginBottom:4}}>{profile.title}</div>
          <div style={{height:3,background:profile.color,width:140,margin:"0 auto 8px"}}/>
          <div style={{fontSize:13,color:T.steel}}>Run #{game.runNumber||1} Complete · {outcomeTitle}</div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:4,marginBottom:12,borderBottom:`1px solid ${T.border}`,paddingBottom:6}}>
          {[["summary","📊 Summary"],["profile","🧭 Your Profile"],["badges","🏅 Badges"],["next","🚀 What's Next"]].map(([t,l])=>(
            <button key={t} className="btn" onClick={()=>setTab(t)} style={{background:tab===t?T.panel:"transparent",border:`1px solid ${tab===t?T.dim:"transparent"}`,color:tab===t?T.white:T.steel,padding:"5px 10px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>{l}</button>
          ))}
        </div>

        {/* SUMMARY TAB */}
        {tab==="summary"&&(
          <div className="fi">
            {/* Key stats grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
              {[
                {l:"Total Earned",v:fmt(c),c:T.mint},
                {l:"Deals Closed",v:cl,c:T.gold},
                {l:"Integrity",v:`${i}/100`,c:i>=70?T.mint:i>=40?T.amber:T.red},
                {l:"Sales Karma",v:`${sk}/100`,c:sk>=70?T.mint:sk>=40?T.amber:T.red},
                {l:"Chargebacks",v:cb,c:cb>=3?T.red:T.steel},
                {l:"Lifestyle",v:lifestyle.label,c:lifestyle.color},
              ].map(s=>(
                <Card key={s.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:T.steel,marginTop:3}}>{s.l}</div>
                </Card>
              ))}
            </div>

            {/* Milestones hit */}
            <Card style={{marginBottom:10}}>
              <div style={{fontSize:11,color:T.steel,marginBottom:8}}>📈 MILESTONES REACHED</div>
              {milestoneLog.length===0 ? (
                <div style={{fontSize:12,color:T.dim}}>No milestones reached this run. Every expert was once a beginner.</div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {MILESTONES.filter(m=>milestoneLog.includes(m.amount)).map(m=>(
                    <div key={m.amount} style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:16}}>{m.icon}</span>
                      <div>
                        <div style={{fontSize:12,fontWeight:700,color:T.gold}}>{m.title} — {fmt(m.amount)}</div>
                        <div style={{fontSize:10,color:T.steel}}>{m.msg}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {/* Karma summary */}
            <Card style={{borderColor:sk>=70?T.mint:sk<40?T.red:T.border}}>
              <div style={{fontSize:11,color:T.steel,marginBottom:6}}>🌀 SALES KARMA SUMMARY</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:20,fontWeight:700,color:sk>=70?T.mint:sk<40?T.red:T.amber}}>{sk}/100</div>
                  <div style={{fontSize:11,color:T.steel}}>{sk>=70?"High karma — your reputation precedes you":sk>=40?"Neutral karma — you played it safe":"Low karma — choices compound over time"}</div>
                </div>
                <div style={{fontSize:32}}>{sk>=70?"🌟":sk>=40?"⚖️":"⚠️"}</div>
              </div>
            </Card>
          </div>
        )}

        {/* PROFILE TAB */}
        {tab==="profile"&&(
          <div className="fi">
            <Card style={{borderColor:profile.color,marginBottom:10}}>
              <div style={{fontSize:22,marginBottom:8}}>{profile.icon}</div>
              <div className="ht" style={{fontSize:22,color:profile.color,marginBottom:6}}>{profile.title}</div>
              <div style={{fontSize:13,lineHeight:1.8,color:T.steel,marginBottom:12}}>{profile.desc}</div>
              <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10}}>
                <div style={{fontSize:10,color:T.dim,marginBottom:3}}>PLAYER TYPE</div>
                <Tag text={profile.tag.replace("_"," ").toUpperCase()} color={profile.color}/>
              </div>
            </Card>

            {/* How you compare */}
            <Card style={{marginBottom:10}}>
              <div style={{fontSize:11,color:T.steel,marginBottom:8}}>YOUR BREAKDOWN</div>
              {[
                {label:"Income Performance",value:`${c>=15000?"Quota hit ✓":c>=10000?"Strong":"Building"}`,pct:Math.min(100,(c/15000)*100),color:T.mint},
                {label:"Integrity Score",value:`${i}/100`,pct:i,color:i>=70?T.mint:i>=40?T.amber:T.red},
                {label:"Sales Karma",value:`${sk}/100`,pct:sk,color:sk>=70?T.mint:sk>=40?T.amber:T.red},
                {label:"Lifestyle Progress",value:lifestyle.label,pct:(ls/5)*100,color:lifestyle.color},
              ].map(r=>(
                <div key={r.label} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                    <span style={{color:T.steel}}>{r.label}</span>
                    <span style={{color:r.color,fontWeight:700}}>{r.value}</span>
                  </div>
                  <Bar v={r.pct} max={100} color={r.color}/>
                </div>
              ))}
            </Card>

            {/* New Game Plus */}
            <Card style={{borderColor:T.purple}}>
              <div style={{fontSize:11,color:T.purple,marginBottom:6}}>🔄 NEW GAME PLUS</div>
              <div style={{fontSize:12,color:T.steel,lineHeight:1.6,marginBottom:10}}>
                {sk>=70?"Your high Sales Karma carries over to the next run. Better opportunities appear earlier. Clients are more receptive. Mentors are more willing to help."
                :sk<40?"Your low karma carries over. More skepticism. Harder objections. You'll need to earn trust back before you can earn big."
                :"Neutral karma carries over. A clean slate with a small edge from what you've learned."}
              </div>
              <Btn onClick={()=>onNewGamePlus({karma:sk,karmaBonus:sk>=70?10:sk<40?-10:0,tier:Math.min((game.lifeTier||1)+1,9),run:(game.runNumber||1)+1})} color={T.purple}>🔄 New Game Plus</Btn>
            </Card>
          </div>
        )}

        {/* BADGES TAB */}
        {tab==="badges"&&(
          <div className="fi">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {Object.entries(ALL_BADGES).map(([k,b])=>{
                const earned=badges.includes(k);
                return(
                  <Card key={k} style={{opacity:earned?1:.4,borderColor:earned?T.gold:T.border}}>
                    <div style={{fontSize:20,marginBottom:4}}>{b.icon}</div>
                    <div style={{fontSize:11,fontWeight:700,color:earned?T.gold:T.steel}}>{b.label}</div>
                    <div style={{fontSize:10,color:T.dim,marginTop:3}}>{b.desc}</div>
                    {earned&&<Tag text="EARNED" color={T.gold}/>}
                  </Card>
                );
              })}
            </div>
            <div style={{textAlign:"center",marginTop:8,fontSize:10,color:T.dim}}>{badges.length}/{Object.keys(ALL_BADGES).length} badges earned this run</div>
          </div>
        )}

        {/* NEXT STEPS TAB — Lead Segmentation CTA */}
        {tab==="next"&&(
          <div className="fi">
            <Card style={{borderColor:profile.color,marginBottom:10}}>
              <div style={{fontSize:14,fontWeight:700,color:profile.color,marginBottom:8}}>{profile.cta}</div>
              <div style={{fontSize:12,color:T.steel,lineHeight:1.7,marginBottom:12}}>
                {profileKey==="sales_hero"&&"You've demonstrated both performance and integrity in this simulation. That combination is genuinely rare. The GSA Ethical Sales Alliance is a community of closers who've chosen the same path — building long-term income through trust, not tricks."}
                {profileKey==="trusted_guide"&&"You protect people over commissions. In a world full of aggressive closers, that's a competitive advantage most people don't understand yet. The GSA community will help you monetize that integrity."}
                {profileKey==="skilled_closer"&&"Your close rate is solid. But the data is clear: ethical closers earn more over 3-5 years because referrals compound and chargebacks don't. The aligned closer training shows you the math."}
                {profileKey==="hungry_hustler"&&"You can close. But right now you're spending energy you don't have to make money that doesn't stay. The long-term ROI of ethical selling is dramatically higher. Let us show you the numbers."}
                {profileKey==="explorer"&&"You've seen the game. You understand what's out there. The Ethical Sales Foundations training is where people in your position start — free, practical, and zero pressure."}
              </div>
              <div style={{fontSize:11,fontWeight:700,color:T.gold,marginBottom:10}}>{profile.ctaLabel}</div>
              {!submitted ? (
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <input
                    type="email" placeholder="your@email.com" value={email}
                    onChange={e=>setEmail(e.target.value)}
                    style={{flex:1,minWidth:180,padding:"9px 12px",borderRadius:6,border:`1px solid ${T.dim}`,background:T.panel,color:T.white,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none"}}
                  />
                  <Btn onClick={handleSubmit} color={profile.color} disabled={!email}>Save My Profile →</Btn>
                </div>
              ) : (
                <div style={{background:`${T.mint}20`,border:`1px solid ${T.mint}`,borderRadius:8,padding:"10px 14px",fontSize:12,color:T.mint}}>
                  ✅ Profile saved. Watch your inbox — we'll send your personalized next step based on your Sales Hero results.
                </div>
              )}
            </Card>

            {/* Always show play again */}
            <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8}}>
              <Btn onClick={()=>onNewGamePlus({karma:sk,karmaBonus:sk>=70?10:sk<40?-10:0,tier:Math.min((game.lifeTier||1)+1,9),run:(game.runNumber||1)+1})} color={T.purple}>🔄 New Game Plus</Btn>
              <Btn onClick={onRestart} outline color={T.steel}>↩ Restart Fresh</Btn>
            </div>
            <div style={{textAlign:"center",marginTop:8,fontSize:10,color:T.dim}}>New Game Plus carries your karma forward and applies it to the next run.</div>
          </div>
        )}

        {/* Always-visible play again */}
        {tab==="summary"&&(
          <div style={{textAlign:"center",marginTop:12,display:"flex",gap:8,justifyContent:"center"}}>
            <Btn onClick={()=>onNewGamePlus({karma:sk,karmaBonus:sk>=70?10:sk<40?-10:0,tier:Math.min((game.lifeTier||1)+1,9),run:(game.runNumber||1)+1})} color={T.purple}>🔄 New Game Plus</Btn>
            <Btn onClick={onRestart} outline color={T.steel}>↩ Restart Fresh</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function SalesHero(){
  const [scene,setScene]=useState("splash");
  const [act1Choice,setAct1Choice]=useState("marcus");
  const [game,setGame]=useState(null);
  const [karmaCarryover,setKarmaCarryover]=useState(null); // New Game Plus data

  const afterAct1=(choice)=>{setAct1Choice(choice);setScene("act2");};

  const afterAct2=({integrity,path})=>{
    const tier=karmaCarryover?.tier||1;
    const tierData=LIFE_TIERS[Math.min(tier-1,LIFE_TIERS.length-1)];
    setGame({
      day:1,commissions:0,integrity,chargebacks:0,
      skillTokens:4,closedDeals:0,
      pipeline:[],pastClients:[],usedDilemmas:[],
      actions:{calls:0},
      energy:60,timeRemaining:600,
      threeBsDone:false,dayBoosts:{cb:0,ob:0},
      salesKarma:50+(karmaCarryover?.karmaBonus||0),
      lifestyleStage:Math.max(1,tier-1),
      badges:[],milestoneLog:[],karmaLog:[],
      discUsedCount:0,
      path:path||"marcus",
      runNumber:karmaCarryover?.run||1,
      startKarmaBonus:karmaCarryover?.karmaBonus||0,
      lifeTier:tier,
      tierData,
      uberActive:tierData.uber?.active||false,
      uberDoneToday:false,
      loan:tierData.loan||null,
      investmentPct:tier>=7?10:0,
      bonusEarned:false,
    });
    setScene("main");
  };

  return (
    <div>
      {scene==="splash"  && <Splash onStart={()=>setScene("act1")}/>}
      {scene==="act1"    && <Act1 onComplete={afterAct1}/>}
      {scene==="act2"    && <Act2 choice={act1Choice} onComplete={afterAct2}/>}
      {scene==="main"    && game && <MainGame initialGame={game} onEnd={g=>{setGame(g);setScene("ending");}}/>}
      {scene==="ending"  && game && <Ending game={game} onRestart={()=>{setGame(null);setKarmaCarryover(null);setScene("splash");}} onNewGamePlus={(data)=>{setKarmaCarryover(data);setGame(null);setScene("splash");}}/>}
    </div>
  );
}

// Mount
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<SalesHero/>);
document.getElementById("loading").style.display="none";
</script>
</body>
