body{background:#08080F;font-family:'DM Sans',sans-serif;color:#F0F0F0;min-height:100vh}
.ht{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.fi{animation:fi .3s ease forwards}.glow{animation:glow 2s infinite}.pulse{animation:pulse 1.5s infinite}
.btn{cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:700;transition:all .15s}
.btn:hover{filter:brightness(1.2);transform:translateY(-1px)}.btn:active{transform:translateY(0)}

.spin{width:38px;height:38px;border:3px solid #1E1E30;border-top-color:#FFD700;border-radius:50%;animation:fi 0s,spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

  .ht { font-size: 38px !important; }
