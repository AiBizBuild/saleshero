const getDialogue=(prospect,phase)=>{
  const pool=PROSPECT_DIALOGUE[prospect.id];
  if(pool&&pool[phase]){
    return rand(pool[phase]);
  }
  const lvl=prospect.sk<=4?"low":prospect.sk<=7?"mid":"high";
  return rand(GENERIC_DIALOGUE_POOLS[phase]?.[lvl]||[`"${prospect.name.split(" ")[0]} considers your question carefully."`]);
};

function Btn({onClick,children,color=T.gold,outline=false,sm=false,disabled=false,full=false,style={}}){
  return (
    <button className="btn" onClick={onClick} disabled={disabled} style={{
      background:outline?"transparent":color,
      border:`2px solid ${color}`,
      color:outline?color:"#08080F",
      padding:sm?"6px 13px":"10px 20px",
      borderRadius:6,fontWeight:700,
      fontSize:sm?11:13,
      cursor:disabled?"not-allowed":"pointer",
      opacity:disabled?.4:1,
      width:full?"100%":"auto",
      letterSpacing:".03em",...style

function Card({children,style={},glow=false}){
  return (
    <div className={glow?"glow":""} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:16,...style}}>

function Tag({text,color=T.steel}){

function Bar({v,max,color,h=6}){
  const pct=Math.max(0,Math.min(100,(v/max)*100));
  return (
    <div style={{background:T.dim,borderRadius:4,height:h,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width .4s"}}/>
    </div>
  );
}

function PhaseBar({phases,cur,color=T.gold}){
  const idx=phases.indexOf(cur);
  return (
    <div style={{display:"flex",gap:4,marginBottom:12}}>

        <div key={p} style={{flex:1,height:4,borderRadius:4,background:i<=idx?color:T.dim,transition:"background .3s"}}/>

}

    {q:"Imagine it's 6 months from now, closing with us. What does your life look like?",choices:[
      {t:"Paint the dream back to them",out:"You feel yourself getting excited. That was intentional."},
      {t:"Notice the future-pacing technique and stay grounded",out:"HERO INTEL: Future pacing is real. Noticing it is a skill."},
      {t:"Ask for the realistic timeline instead",out:"They hedge. 'It varies.' Red flag noted."},
    ]},
    {q:"We require a $3,000 training investment upfront. It pays for itself after your first close.",choices:[
      {t:"Ask what training includes + see proof of results",out:"Solid due diligence. They respect it — or they don't. Either tells you something."},
      {t:"Say yes immediately",out:"Too easy. Should you have asked more?"},
      {t:"Negotiate — pay from first commission",out:"They say they 'don't normally do that.' You moved the frame."},
      {t:"Walk away — paying to work is a red flag",out:"HERO INTEL: Legitimate companies don't charge you to close for them."},
    ]},

  const BRIDGES={
    stay:[{icon:"💰",color:T.red,title:"YOU STAYED.",
      body:`You closed your laptop and told yourself:\n\n"The product is fine. People buy it. I'm just the messenger."\n\nMarcus sends your first batch of leads the next morning. Real people with real problems.\n\nYou start Day 1 carrying that weight.`,cta:"Start Closing →"}],
    confront:[{icon:"⚔️",color:T.amber,title:"YOU SAID SOMETHING.",
      body:`You sent Marcus a DM that night. Direct. Professional.\n\nHe pushed back. Then went quiet for 24 hours.\n\nThen: "Fine. We pull the testimonial. You close on real results. Don't make a habit of this."\n\nIt wasn't everything. But it was something. You got to work.`,cta:"Start Closing →"}],
    walkaway:[
      {icon:"🚪",color:T.mint,title:"YOU WALKED AWAY.",
       body:`No dramatic exit. You just stopped replying.\n\nFor three days you second-guessed yourself. Marcus made $47K last month. You made nothing.\n\nOn Day 4, someone in a closer community posted about a legitimate offer. Real results, transparent pay. You DMed.`,cta:"See what happens →"},
      {icon:"📞",color:T.mint,title:"THE CALL.",
       body:`Her name was Diana. Health coaching. 200 verified client results. A real refund policy.\n\n"I need someone who actually cares whether the client succeeds. Not just whether they sign."\n\nYou told her about Marcus — enough.\n\n"Good. That's exactly who I want. When can you start?"`,cta:"Day 1 →"},
    ],
  };

  if(bridge){
    const steps=BRIDGES[bridge.choice];
    const cur=steps[bridge.step];
    return (
      <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{maxWidth:520,width:"100%"}} className="fi">
          <div style={{fontSize:48,textAlign:"center",marginBottom:10}}>{cur.icon}</div>
          <div className="ht" style={{fontSize:34,color:cur.color,textAlign:"center",marginBottom:14}}>{cur.title}</div>
          <Card style={{borderColor:cur.color,marginBottom:18}}>
            <div style={{fontSize:14,lineHeight:1.9,color:T.steel,whiteSpace:"pre-line"}}>{cur.body}</div>
          </Card>
          <div style={{textAlign:"center"}}>
            {bridge.step<steps.length-1 ? (
              <Btn onClick={()=>setBridge({...bridge,step:bridge.step+1})} style={{fontSize:15,padding:"12px 36px"}}>{cur.cta}</Btn>
            ) : (
              <Btn onClick={()=>onComplete({integrity:bridge.choice==="stay"?20:bridge.choice==="confront"?75:65})} style={{fontSize:15,padding:"12px 36px",background:cur.color,borderColor:cur.color}}>{cur.cta}</Btn>
            )}
          </div>
        </div>
      </div>
    );
  }

  if(phase==="intro") return (
    <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <div className="ht" style={{fontSize:26,color:T.steel}}>ACT 2</div>
        <div className="ht" style={{fontSize:44,color:T.white,marginBottom:12}}>THE PITCH</div>
        <Card>
          <div style={{fontSize:13,lineHeight:1.8,color:T.steel,marginBottom:16}}>Marcus joins the Zoom. Sharp, friendly, practiced. He's about to run a close on <span style={{color:T.gold}}>you</span>.<br/><br/><span style={{color:T.amber}}>⚡ OBJECTIVE:</span> Watch the techniques. Notice the pressure. Learn from both sides of the call.</div>
          <Btn onClick={()=>setPhase("interview")}>Start the Call →</Btn>
        </Card>
      </div>
    </div>
  );

  if(phase==="interview"){
    const s=STEPS[step];
    return (
      <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
        <div style={{maxWidth:560,margin:"0 auto"}}>
          <div className="ht" style={{fontSize:20,color:T.steel,marginBottom:8}}>INTERVIEW {step+1}/{STEPS.length}</div>
          <Card className="fi" style={{marginBottom:12,borderColor:T.dim}}>
            <div style={{display:"flex",gap:10}}>
              <div style={{fontSize:26}}>🧑‍💼</div>
              <div><div style={{fontSize:10,color:T.steel}}>MARCUS</div><div style={{fontSize:14,lineHeight:1.6}}>"{s.q}"</div></div>
            </div>

          {!chosen ? (
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {s.choices.map((c,i) => (
                <button key={i} className="btn" onClick={()=>setChosen(c)} style={{background:"transparent",border:`1px solid ${T.dim}`,color:T.white,padding:"11px 14px",borderRadius:8,textAlign:"left",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
                  <span style={{color:T.steel,marginRight:7}}>{i+1}.</span>{c.t}
                </button>
              ))}
            </div>
          ) : (
            <Card className="fi" style={{borderColor:T.gold}}>
              <div style={{fontSize:11,color:T.steel,marginBottom:4}}>OUTCOME</div>
              <div style={{fontSize:13,marginBottom:12}}>{chosen.out}</div>
              <Btn onClick={()=>{if(step<STEPS.length-1){setStep(x=>x+1);setChosen(null);}else setPhase("reveal");}} sm>{step<STEPS.length-1?"Continue →":"End Call →"}</Btn>
            </Card>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <div className="ht" style={{fontSize:26,color:T.red}}>⚠️ ETHICAL REVEAL</div>
        <div style={{height:2,background:T.red,marginBottom:16}}/>
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:13,lineHeight:1.8,marginBottom:14}}>
            You get access to the closer team's Slack. Scrolling through:
            <div style={{background:T.panel,borderRadius:8,padding:12,borderLeft:`3px solid ${T.red}`,marginTop:10,fontSize:12,lineHeight:1.7}}>
              🚩 The VSL testimonial is a paid actor.<br/>
              🚩 Closers told: "Don't mention the refund policy unless forced."<br/>
              🚩 Multiple clients who couldn't afford it were pushed hard.
            </div>
          </div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:T.gold}}>What do you do?</div>
          {[
            {k:"stay",     t:"Stay and close anyway — the money is good",  l:"💰 Take the money",  c:T.red,   i:"Starting integrity: 20/100"},
            {k:"confront", t:"Confront Marcus about what you found",        l:"⚔️ Speak up",        c:T.amber, i:"Starting integrity: 75/100"},
            {k:"walkaway", t:"Quietly leave and find a legitimate offer",   l:"🚪 Walk away clean", c:T.mint,  i:"Starting integrity: 65/100"},
          ].map((c,i) => (

              style={{display:"block",width:"100%",marginBottom:8,background:"transparent",border:`2px solid ${c.c}`,color:c.c,padding:"11px 14px",borderRadius:8,textAlign:"left",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
              <div>{c.l}: {c.t}</div>

}

// ── 3 BS BOARD ───────────────────────────────────────────────
function ThreeBs({game,onComplete,onSkip,isRecharge=false}){
  const [sel,setSel]=useState({body:null,being:null,business:null});
  const [confirmed,setConfirmed]=useState(false);
  const allSel=sel.body&&sel.being&&sel.business;
  const totalTime=Object.values(sel).reduce((a,s)=>a+(s?.time||0),0);
  const totalEnergy=Object.values(sel).reduce((a,s)=>a+(s?.energy||0),0);
  const boosts=[];
  Object.values(sel).forEach(s=>{
    if(!s)return;
    if(s.cbBoost) boosts.push(`Close +${(s.cbBoost*100).toFixed(0)}%`);
    if(s.obBoost) boosts.push(`Obj +${(s.obBoost*100).toFixed(0)}%`);
    if(s.intBonus) boosts.push(`Integrity +${s.intBonus}`);
    if(s.tokBonus) boosts.push(`+${s.tokBonus} Token`);
  });
  const ec=game.energy>=60?T.mint:game.energy>=30?T.amber:T.red;
  const confirm=()=>{setConfirmed(true);setTimeout(()=>onComplete(sel,totalTime,totalEnergy),800);};

  return (
    <div style={{minHeight:"100vh",background:T.bg}}>
      <HeroStats game={game}/>
      <div style={{maxWidth:740,margin:"0 auto",padding:14}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div className="ht" style={{fontSize:34,color:T.white}}>{isRecharge?"⚡ RECHARGE — 3 Bs":"✨ DAILY 3 Bs"}</div>
          <div style={{color:isRecharge?T.amber:T.steel,fontSize:12,marginBottom:3}}>{isRecharge?"Energy dropping — a 3 Bs reset restores closing strength and helps clients feel understood.":"Choose ONE from each category. Available any time during the day."}</div>
          <div style={{fontSize:10,color:T.dim}}>Quick activities: <span style={{color:T.mint}}>15 min</span> · Walk, Exercise, Yoga, Meditate, Read, Role Play: <span style={{color:T.amber}}>30 min</span></div>
        </div>
        {isRecharge&&(
          <div style={{background:`${ec}18`,border:`1px solid ${ec}40`,borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",gap:12,alignItems:"center"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:ec,marginBottom:3}}>⚡ CURRENT ENERGY: {game.energy}/100</div>
              <Bar v={game.energy} max={100} color={ec}/>
            </div>
            <div style={{fontSize:11,color:T.steel,maxWidth:240}}>{game.energy<30?"⚠️ Burnout zone — clients won't feel heard. Recharge before your next call.":game.energy<55?"Energy dipping. A reset sharpens your next close.":"Good energy. A boost pushes you into peak performance."}</div>
          </div>

        {["body","being","business"].map(cat=>{
          const C=THREE_BS_DATA[cat];
          return (
            <div key={cat} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                <span style={{fontSize:15}}>{C.icon}</span>
                <div className="ht" style={{fontSize:20,color:C.color}}>{C.label}</div>
                <div style={{fontSize:10,color:T.steel}}>{C.sub}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {C.opts.map(opt=>{
                  const selected=sel[cat]?.id===opt.id;
                  const noTime=opt.time>game.timeRemaining;
                  return (
                    <button key={opt.id} className="btn" onClick={()=>!noTime&&setSel(x=>({...x,[cat]:selected?null:opt}))}
                      style={{background:selected?`${C.color}22`:noTime?`${T.dim}10`:T.card,border:`2px solid ${selected?C.color:noTime?T.dim:T.border}`,borderRadius:8,padding:"9px 11px",textAlign:"left",cursor:noTime?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",color:noTime?T.dim:T.white,opacity:noTime?.5:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontSize:13}}>{opt.emoji}</span>
                          <span style={{fontWeight:700,fontSize:11}}>{opt.name}</span>

                        {selected&&<span style={{color:C.color}}>✓</span>}

                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        <Tag text={`⏱️ ${opt.time}m`} color={opt.time>=30?T.amber:T.mint}/>

                      </div>

        })}
        <Card style={{borderColor:allSel?T.gold:T.border}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:T.steel,marginBottom:3}}>{isRecharge?"RECHARGE SUMMARY":"ROUTINE SUMMARY"}</div>
              {allSel ? (
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  <Tag text={`⏱️ ${totalTime} min total`} color={totalTime>60?T.amber:T.mint}/>
                  {totalEnergy>0&&<Tag text={`⚡ +${totalEnergy}`} color={T.mint}/>}
                  {boosts.map((b,i)=><Tag key={i} text={b} color={T.gold}/>)}

      </div>
    </div>
  );
}

// ── SALES CALL ───────────────────────────────────────────────
function SalesCall({prospect,game,onComplete,isOutbound=false}){
  const PHASES=["OPENER","DISCOVERY","PRESENTATION","OBJECTION","CLOSE"];
  const [phase,setPhase]=useState("OPENER");
  const [log,setLog]=useState([`📞 ${isOutbound?"You dialed":"Connected with"} ${prospect.name}`]);
  const [mods,setMods]=useState({cb:(game.dayBoosts?.cb||0),ob:(game.dayBoosts?.ob||0),rapport:0,discRevealed:false});
  const [obj,setObj]=useState(null);
  const [result,setResult]=useState(null);
  const addLog=m=>setLog(l=>[...l,m]);
  const lvl=prospect.sk<=4?"low":prospect.sk<=7?"mid":"high";
  const ec=game.energy>=70?.10:game.energy<30?-.15:0;

  const activateSkill=key=>{
    const sk=game.skills[key];
    if(!sk?.unlocked||game.skillTokens<sk.tokens) return;
    onComplete("skill_token",0,0,0,null,sk.tokens);
    if(key==="disc"){setMods(m=>({...m,discRevealed:true,cb:m.cb+.25}));addLog(`🧠 DISC: ${prospect.disc} — ${DISC_INFO[prospect.disc].tip}`);}
    else if(key==="fuji"){setMods(m=>({...m,cb:m.cb+.30}));addLog("🔍 FUJI complete. Close +30%");}
    else if(key==="futurep"){setMods(m=>({...m,cb:m.cb+.20}));addLog("🔭 Future Paced. Close +20%");}
    else if(key==="mirror"){setMods(m=>({...m,ob:m.ob+.30}));addLog("🪞 Mirroring active. Obj +30%");}
    else if(key==="silent"){
      addLog("🤫 Silent Close initiated...");
      setTimeout(()=>{
        const ok=Math.random()<.70;
        addLog(ok?"✅ They broke first. 'Okay. Let's do it.' Close +35%":"❌ You broke first. Train the discipline.");
        if(ok) setMods(m=>({...m,cb:m.cb+.35}));
      },2000);
    }
    else if(key==="spin"){setMods(m=>({...m,cb:m.cb+.35}));addLog("📊 SPIN complete. Close +35%");}
    else if(key==="walkaway"){if(prospect.vuln){addLog("🚶 Walk-Away: Declined to close. Integrity +20.");setResult("walked_away");}}
    else if(key==="challenger"){setMods(m=>({...m,cb:m.cb+.30}));addLog("⚔️ Challenger: They see the problem differently. Close +30%");}
  };

  const choose=action=>{
    let m={...mods},msg="";
    if(phase==="OPENER"){
      if(action==="rapport"){m.rapport+=1;msg="🤝 Rapport built. They're relaxed.";}
      else if(action==="direct"){msg="⚡ Direct open. Efficient, lower warmth.";}
      else if(action==="interrupt"){m.cb+=.10;msg="💥 Pattern interrupt landed. Close +10%";}
      setPhase("DISCOVERY");
    }else if(phase==="DISCOVERY"){
      if(action==="deep"){m.cb+=.20;msg="🔍 Deep discovery complete. Close +20%";}
      else if(action==="surface"){msg="📋 Surface questions noted.";}
      else if(action==="assume"){m.cb-=.10;msg="⚠️ Assumed the need. They felt unheard. Close -10%";}
      setPhase("PRESENTATION");
    }else if(phase==="PRESENTATION"){
      if(action==="personal"){m.cb+=.15;msg="🎯 Personalized presentation. Close +15%";}
      else if(action==="gap"){m.cb+=.20;msg="🌉 Gap close framing. Close +20%";}
      else if(action==="generic"){msg="📄 Generic pitch. They've heard it before.";}
      const excl=prospect.noSpouse?["spouse"]:[];
      const custom=prospect.cObj?[prospect.cObj]:[];
      const pool=[...custom,...OBJECTIONS.filter(o=>!excl.includes(o.tag))];
      setObj(rand(pool));setPhase("OBJECTION");
    }else if(phase==="OBJECTION"){
      if(action==="handle"){m.ob+=.20;msg=`✅ Handled: ${obj.handle}`;}
      else if(action==="isolate"){m.cb+=.10;msg="🎯 Isolated. Real block now clear. Close +10%";}
      else if(action==="fold"){msg="🏳️ Folded. They sensed weakness.";}
      else if(action==="walkaway"){addLog("🚶 Walk-away on vulnerable prospect. Integrity +20.");setResult("walked_away");return;}
      setPhase("CLOSE");
    }else if(phase==="CLOSE"){
      const base=Math.max(.05,Math.min(.90,.30+m.cb+m.ob+(m.rapport*.05)-(prospect.sk*.025)+ec+(isOutbound?-.05:0)));
      if(Math.random()<base){
        if(prospect.vuln&&action==="assume"){msg="⚠️ Closed aggressively on vulnerable prospect.";setResult("closed_risky");}
        else{msg=`✅ CLOSED! ${prospect.name} said yes. ${fmt(prospect.comm)} earned.`;setResult("closed");}
      }else{
        const p=rand(["callback","no_close","ghost"]);
        if(p==="callback"){msg=`📅 Follow-up scheduled with ${prospect.name}.`;setResult("callback");}
        else if(p==="ghost"){msg="👻 They went quiet mid-close. Ghosted.";setResult("ghost");}
        else{msg=`❌ No close. "I'll think about it."`;setResult("no_close");}
      }
    }
    addLog(msg);setMods(m);
  };

  if(result){
    const comm=(result==="closed"||result==="closed_risky")?prospect.comm:0;
    const intD=result==="walked_away"?+20:result==="closed_risky"?-10:0;
    const cbD=result==="closed_risky"?1:0;
    const drain=ENERGY_DRAIN[result]||15;
    const tCost=result==="closed"||result==="closed_risky"?70:result==="callback"?55:result==="ghost"?45:50;
    const pipe=(result==="callback"||result==="no_close")?{id:uid(),name:prospect.name,emoji:prospect.emoji,offer:prospect.offer||"Program",comm:prospect.comm,src:isOutbound?"outbound":"inbound",status:result}:null;
    return (
      <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
        <HeroStats game={game}/>
        <div style={{maxWidth:520,margin:"0 auto",paddingTop:14}}>
          <Card className="fi" style={{borderColor:comm>0?T.gold:result==="callback"?T.blue:T.dim,textAlign:"center"}}>
            <div style={{fontSize:38,marginBottom:8}}>{comm>0?"🏆":result==="callback"?"📅":result==="walked_away"?"🚶":"❌"}</div>
            <div style={{fontWeight:700,fontSize:16,color:comm>0?T.gold:result==="callback"?T.blue:T.steel,marginBottom:10}}>
              {result==="closed"&&`Closed! ${fmt(comm)} earned. +1 Token.`}
              {result==="closed_risky"&&`Closed aggressively. ${fmt(comm)} earned. Integrity -10.`}
              {result==="callback"&&`Follow-up scheduled. Added to pipeline.`}
              {result==="walked_away"&&`You walked away. Integrity +20.`}
              {result==="no_close"&&`No close. Added to pipeline for follow-up.`}
              {result==="ghost"&&`Ghosted. An objection wasn't fully resolved.`}
            </div>
            <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap",marginBottom:14}}>
              <Tag text={`⏱️ ${tCost}min`} color={T.steel}/>
              {comm>0&&<Tag text={`+${fmt(comm)}`} color={T.mint}/>}
              {intD!==0&&<Tag text={`Integrity ${intD>0?"+":""}${intD}`} color={intD>0?T.mint:T.red}/>}
              <Tag text={`Energy -${drain}`} color={T.amber}/>
              {pipe&&<Tag text="→ Pipeline" color={T.blue}/>}
            </div>
            <Btn onClick={()=>onComplete(result,comm,intD,cbD,pipe,0,tCost,drain)}>← Back to Hub</Btn>
          </Card>
          <div style={{background:T.panel,borderRadius:8,padding:10,marginTop:10,maxHeight:100,overflowY:"auto"}}>
            {log.map((l,i)=><div key={i} style={{fontSize:10,color:T.steel,marginBottom:2}}>{l}</div>)}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,padding:16}}>
      <HeroStats game={game}/>
      <div style={{maxWidth:660,margin:"0 auto",paddingTop:12}}>
        {game.energy<30&&<div className="pulse" style={{background:`${T.red}20`,border:`1px solid ${T.red}`,borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:12,color:T.red}}>🔥 BURNOUT ACTIVE — Close rate reduced. Clients won't feel heard. Recharge after this call.</div>}
        <PhaseBar phases={PHASES} cur={phase} color={T.gold}/>

        {/* Prospect card */}
        <Card style={{marginBottom:10,borderColor:prospect.vuln?T.amber:T.border}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{fontSize:36}}>{prospect.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15}}>{prospect.name}</div>
              <div style={{fontSize:11,color:T.steel}}>{prospect.age} · {prospect.city} · {prospect.role}</div>
              <div style={{fontSize:11,color:T.dim,lineHeight:1.5,marginTop:3}}>{prospect.back}</div>
              {isOutbound&&<Tag text="📞 Outbound — you called them" color={T.blue}/>}
              {prospect.ref&&<Tag text="⭐ Referral" color={T.gold}/>}
            </div>
            <div style={{textAlign:"right",minWidth:58}}>
              <div style={{fontSize:9,color:T.steel}}>Skepticism</div>

        {/* Objection bubble */}

          <div className="fi" style={{background:T.panel,border:`2px solid ${T.amber}`,borderRadius:10,padding:14,marginBottom:10}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
              <div style={{fontSize:24}}>{prospect.emoji}</div>
              <div>
                <div style={{fontSize:10,color:T.amber,marginBottom:4}}>
                  💬 {prospect.name.split(" ")[0]} objects ·{" "}
                  <span style={{color:prospect.sk<=4?T.mint:prospect.sk<=7?T.amber:T.red}}>
                    {prospect.sk<=4?"Light resistance":prospect.sk<=7?"Medium resistance":"Hard resistance"}
                  </span>
                </div>
                <div style={{fontSize:14,color:T.white,lineHeight:1.7,fontStyle:"italic"}}>
                  {obj[lvl]||`"${obj.text}"`}

              </div>
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:8,display:"flex",gap:14,flexWrap:"wrap"}}>
              <div><div style={{fontSize:9,color:T.steel,marginBottom:2}}>🧠 Real concern:</div><div style={{fontSize:11,color:T.dim}}>{obj.real}</div></div>
              <div><div style={{fontSize:9,color:T.steel,marginBottom:2}}>💡 Suggested handle:</div><div style={{fontSize:11,color:T.dim}}>{obj.handle}</div></div>
            </div>
          </div>
        )}

        {/* Action buttons */}
        <Card style={{marginBottom:10}}>
          <div style={{fontSize:10,color:T.gold,letterSpacing:".08em",marginBottom:8}}>
            STAGE: <span style={{color:T.white}}>{phase}</span>
            {phase==="OBJECTION"&&<span style={{color:T.amber}}> — How do you respond?</span>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {phase==="OPENER"&&<>
              <Btn full outline color={T.mint} sm onClick={()=>choose("rapport")}>🤝 Build rapport — small talk, find common ground first</Btn>
              <Btn full outline color={T.steel} sm onClick={()=>choose("direct")}>⚡ Jump to business — respect their time</Btn>
              <Btn full outline color={T.gold} sm onClick={()=>choose("interrupt")}>💥 Pattern interrupt — unexpected opener</Btn>
            </>}
            {phase==="DISCOVERY"&&<>
              <Btn full outline color={T.mint} sm onClick={()=>choose("deep")}>🔍 Deep discovery — pain, history, real cost, dream outcome</Btn>
              <Btn full outline color={T.steel} sm onClick={()=>choose("surface")}>📋 Surface questions — basics and move on</Btn>
              <Btn full outline color={T.red} sm onClick={()=>choose("assume")}>⚠️ Assume the need and pitch immediately</Btn>
            </>}
            {phase==="PRESENTATION"&&<>
              <Btn full outline color={T.mint} sm onClick={()=>choose("personal")}>🎯 Mirror their language — use their exact words</Btn>
              <Btn full outline color={T.gold} sm onClick={()=>choose("gap")}>🌉 Gap close — show distance between now and their goal</Btn>
              <Btn full outline color={T.steel} sm onClick={()=>choose("generic")}>📄 Standard pitch deck</Btn>
            </>}
            {phase==="OBJECTION"&&<>
              <Btn full outline color={T.mint} sm onClick={()=>choose("handle")}>💬 Handle it — acknowledge, reframe, resolve</Btn>
              <Btn full outline color={T.gold} sm onClick={()=>choose("isolate")}>🎯 Isolate — "If we solve that, anything else stopping you?"</Btn>
              <Btn full outline color={T.red} sm onClick={()=>choose("fold")}>🏳️ Fold — offer to follow up later</Btn>
              {prospect.vuln&&<Btn full outline color={T.amber} sm onClick={()=>choose("walkaway")}>🚶 Walk Away — this prospect isn't ready</Btn>}
            </>}
            {phase==="CLOSE"&&<>
              <Btn full outline color={T.mint} sm onClick={()=>choose("direct")}>🎯 Direct — "Based on everything, are you ready?"</Btn>
              <Btn full outline color={T.gold} sm onClick={()=>choose("assume")}>💳 Assumptive — "Which card works best?"</Btn>
              <Btn full outline color={T.steel} sm onClick={()=>choose("summary")}>📋 Summary close — recap pain, goal, solution, then ask</Btn>
              <Btn full outline color={T.amber} sm onClick={()=>choose("choice")}>🔀 Choice — "Option A or B — which fits better?"</Btn>
            </>}
          </div>
        </Card>

        {/* Skill hotbar */}
        <div style={{borderTop:`1px solid ${T.border}`,paddingTop:8}}>
          <div style={{fontSize:9,color:T.steel,marginBottom:5}}>🔮 SKILLS — {game.skillTokens} tokens</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {Object.entries(game.skills).map(([k,sk])=>(
              <button key={k} className="btn" onClick={()=>activateSkill(k)} disabled={!sk.unlocked||game.skillTokens<sk.tokens} title={sk.desc}
                style={{background:sk.unlocked?T.panel:T.card,border:`1px solid ${sk.unlocked?T.dim:T.border}`,color:sk.unlocked?T.white:T.dim,padding:"4px 8px",borderRadius:5,cursor:sk.unlocked?"pointer":"default",fontSize:10,fontFamily:"'DM Sans',sans-serif",opacity:sk.unlocked?1:.4}}>
                {sk.icon} {sk.name}{sk.tokens>0&&<span style={{color:T.gold}}> ({sk.tokens}🔮)</span>}{!sk.unlocked&&" 🔒"}

          </div>
        </div>
      </div>

  );
}

// ── TRAINING CENTER ───────────────────────────────────────────
function TrainingCenter({game,onComplete,onBack}){
  const [sel,setSel]=useState(null);
  const [tPhase,setTPhase]=useState("lesson");
  const [lessonPage,setLessonPage]=useState(0);
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState(0);

  const startTraining=k=>{
    if(game.timeRemaining<TRAINING_DATA[k].time) return;
    setSel(k);setTPhase("lesson");setLessonPage(0);setAnswers({});
  };

  const submitTest=()=>{
    const mod=TRAINING_DATA[sel];
    let c=0;
    mod.quiz.forEach((q,i)=>{if(answers[i]===q.ans)c++;});
    setScore(c);setTPhase("result");
  };

  if(!sel) return (
    <div style={{minHeight:"100vh",background:T.bg}}>
      <HeroStats game={game}/>
      <div style={{maxWidth:720,margin:"0 auto",padding:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <Btn onClick={onBack} outline color={T.steel} sm>← Back</Btn>
          <div>
            <div className="ht" style={{fontSize:26,color:T.white}}>📚 TRAINING CENTER</div>
            <div style={{fontSize:11,color:T.steel}}>Lesson + 3-question test. Pass 2/3 = skill unlocked and active on calls. Costs real game time.</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {Object.entries(TRAINING_DATA).map(([k,mod])=>{
            const sk=game.skills[k];
            const noTime=game.timeRemaining<mod.time;
            return (
              <Card key={k} style={{borderColor:sk?.unlocked?T.gold:noTime?T.dim:T.border,opacity:noTime?.6:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{fontSize:22}}>{mod.icon}</div>
                  {sk?.unlocked?<Tag text="✓ UNLOCKED" color={T.gold}/>:<Tag text={`⏱️ ${mod.time}min`} color={noTime?T.dim:T.blue}/>}
                </div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{mod.name}</div>
                <div style={{fontSize:10,color:T.steel,marginBottom:8,lineHeight:1.4}}>{sk?.unlocked?"Skill unlocked and active on calls.":"Complete lesson and pass the test to unlock."}</div>
                <Btn full sm disabled={sk?.unlocked||noTime} color={sk?.unlocked?T.dim:T.blue} onClick={()=>startTraining(k)}>
                  {sk?.unlocked?"✓ Complete":noTime?"Not enough time":"Start Training →"}
                </Btn>
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );

  const mod=TRAINING_DATA[sel];

  if(tPhase==="lesson"){
    const pg=mod.lesson[lessonPage];
    return (
      <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
        <HeroStats game={game}/>
        <div style={{maxWidth:600,margin:"0 auto",paddingTop:12}}>
          <div style={{fontSize:10,color:T.blue,letterSpacing:".15em",marginBottom:4}}>📚 {mod.name.toUpperCase()} — {lessonPage+1}/{mod.lesson.length}</div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {mod.lesson.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=lessonPage?T.blue:T.dim}}/>)}
          </div>
          <Card style={{borderColor:T.blue,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:16,color:T.blue,marginBottom:10}}>{pg.t}</div>
            <div style={{fontSize:13,lineHeight:1.8,color:T.white,whiteSpace:"pre-line"}}>{pg.b}</div>
          </Card>
          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
            {lessonPage>0&&<Btn onClick={()=>setLessonPage(x=>x-1)} outline color={T.steel} sm>← Prev</Btn>}
            <div style={{flex:1}}/>
            {lessonPage<mod.lesson.length-1
              ? <Btn onClick={()=>setLessonPage(x=>x+1)} style={{padding:"10px 28px"}}>Next →</Btn>
              : <Btn onClick={()=>setTPhase("test")} style={{padding:"10px 28px",background:T.gold,borderColor:T.gold}}>Take the Test →</Btn>
            }
          </div>
        </div>
      </div>
    );
  }

  if(tPhase==="test"){
    const allAnswered=Object.keys(answers).length===mod.quiz.length;
    return (
      <div style={{minHeight:"100vh",background:T.bg,padding:24}}>
        <HeroStats game={game}/>
        <div style={{maxWidth:580,margin:"0 auto",paddingTop:12}}>
          <div style={{fontSize:10,color:T.gold,letterSpacing:".15em",marginBottom:4}}>🧪 TEST — {mod.name.toUpperCase()}</div>
          <div style={{fontSize:11,color:T.steel,marginBottom:12}}>3 questions. Need 2/3 to pass and unlock the skill.</div>
          {mod.quiz.map((q,qi)=>(
            <Card key={qi} style={{marginBottom:10,borderColor:answers[qi]!==undefined?T.blue:T.border}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10,lineHeight:1.5}}><span style={{color:T.steel}}>{qi+1}. </span>{q.q}</div>
              {q.opts.map((opt,oi)=>(
                <button key={oi} className="btn" onClick={()=>setAnswers(a=>({...a,[qi]:oi}))}
                  style={{display:"block",width:"100%",marginBottom:5,background:answers[qi]===oi?`${T.blue}25`:"transparent",border:`1px solid ${answers[qi]===oi?T.blue:T.dim}`,color:answers[qi]===oi?T.white:T.steel,padding:"9px 12px",borderRadius:6,textAlign:"left",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
                  <span style={{color:answers[qi]===oi?T.blue:T.dim,marginRight:6}}>{["A","B","C","D"][oi]}.</span>{opt}
                </button>
              ))}
            </Card>
          ))}
          <div style={{textAlign:"center",marginTop:12}}>
            <Btn onClick={submitTest} disabled={!allAnswered} style={{fontSize:14,padding:"11px 32px"}}>Submit Answers →</Btn>
          </div>
        </div>
      </div>
    );
  }

  const passed=score>=2;
  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:460,width:"100%"}} className="fi">
        <Card style={{borderColor:passed?T.gold:T.red,textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:8}}>{passed?"🏆":"📖"}</div>
          <div className="ht" style={{fontSize:28,color:passed?T.gold:T.amber,marginBottom:6}}>{passed?"SKILL UNLOCKED":"REVIEW & RETRY"}</div>
          <div style={{fontSize:14,color:T.steel,marginBottom:8}}>Score: {score}/3 — {passed?"Passed!":"Need 2/3 to pass."}</div>
          {passed&&<div style={{background:`${T.gold}15`,border:`1px solid ${T.gold}40`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12}}>✅ <strong>{mod.name}</strong> is now active in your skill hotbar during calls.</div>}
          <div style={{textAlign:"left",marginBottom:12}}>
            {mod.quiz.map((q,qi)=>(
              <div key={qi} style={{marginBottom:5,fontSize:11}}>
                <span style={{color:answers[qi]===q.ans?T.mint:T.red}}>{answers[qi]===q.ans?"✅":"❌"}</span>
                <span style={{color:T.steel,marginLeft:5}}>Q{qi+1}: </span>
                <span style={{color:T.white}}>{q.opts[q.ans]}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>
            {!passed&&<Btn onClick={()=>{setTPhase("lesson");setLessonPage(0);setAnswers({});}} outline color={T.blue} sm>Re-read Lesson</Btn>}
            <Btn onClick={()=>onComplete(sel,passed,mod.time)} color={passed?T.gold:T.steel}>{passed?"Continue →":"Back to Training"}</Btn>
          </div>
        </Card>
      </div>
    </div>
  );
}
